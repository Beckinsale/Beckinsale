name: Update README cards

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *" # Автообновление каждый день в 3 утра
  workflow_dispatch:  # Кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Генерация основной карточки (Статистика: Rank, Commits, PRs)
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=beckinsale&show_icons=true&count_private=true&theme=gruvbox&rank_icon=github&hide=stars,issues&show=prs_merged,prs_merged_percentage
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Генерация карточки языков (Top Languages)
      - name: Generate languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=beckinsale&layout=compact&theme=gruvbox
          path: profile/langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 3. Сохранение изменений в репозиторий
      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          mkdir -p profile
          git add profile/*.svg
          
          # Проверяем, изменились ли файлы, чтобы не делать пустых коммитов
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # [skip ci] гарантирует, что этот коммит не запустит экшен снова (защита от петли)
          git commit -m "Update README cards [skip ci]" || exit 0
          git push
